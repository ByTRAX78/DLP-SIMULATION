services:
  db:
    image: postgres:16-alpine
    container_name: dlp_db
    environment:
      POSTGRES_DB: dlp_demo
      POSTGRES_USER: dlp_admin
      POSTGRES_PASSWORD: dlpsecurate
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dlp_admin -d dlp_demo"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: ./app
    container_name: dlp_app
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: dlp_demo
      DB_USER: dlp_admin
      DB_PASS: dlpsecurate
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
